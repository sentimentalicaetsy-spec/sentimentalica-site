<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 190" preserveAspectRatio="xMidYMin slice">
  <defs>
    <!-- rough, organic torn-paper edge -->
    <filter id="torn" x="-6%" y="-10%" width="112%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.028" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="torn2" x="-6%" y="-10%" width="112%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.022" numOctaves="3" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="16" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- soft drop shadow so each sheet lifts off the page -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#3a3326" flood-opacity="0.22"/>
    </filter>
    <filter id="shadowSoft" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#2a2a3a" flood-opacity="0.16"/>
    </filter>
    <!-- faint paper grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#e6ecf7"/>
    </linearGradient>
    <clipPath id="sheetClip"><rect x="-40" y="-40" width="1520" height="178"/></clipPath>
  </defs>

  <!-- ===== scraps peeking out beneath the main sheet ===== -->
  <g filter="url(#shadow)"><g filter="url(#torn)">
    <rect x="120" y="60" width="300" height="120" fill="#e3d7bd" transform="rotate(-1.4 270 120)"/>
  </g></g>
  <g filter="url(#shadowSoft)"><g filter="url(#torn)">
    <rect x="980" y="56" width="340" height="124" fill="#d7dcea" transform="rotate(1.6 1150 120)"/>
  </g></g>
  <g filter="url(#shadow)"><g filter="url(#torn2)">
    <rect x="470" y="64" width="300" height="118" fill="#ece2cd" transform="rotate(-0.7 620 120)"/>
  </g></g>
  <g filter="url(#shadow)"><g filter="url(#torn)">
    <rect x="760" y="62" width="260" height="120" fill="#e7dcc4" transform="rotate(0.9 890 120)"/>
  </g></g>

  <!-- ===== main lined-paper sheet (straight top off-canvas, torn bottom) ===== -->
  <g filter="url(#shadowSoft)">
    <g filter="url(#torn2)">
      <rect x="-40" y="-40" width="1520" height="178" fill="url(#sheet)"/>
    </g>
  </g>
  <!-- faint ruling lines + grain, clipped to the sheet area -->
  <g clip-path="url(#sheetClip)">
    <g stroke="#163087" stroke-opacity="0.07" stroke-width="1">
      <line x1="0" y1="34" x2="1440" y2="34"/>
      <line x1="0" y1="62" x2="1440" y2="62"/>
      <line x1="0" y1="90" x2="1440" y2="90"/>
      <line x1="0" y1="118" x2="1440" y2="118"/>
    </g>
    <rect x="-40" y="-40" width="1520" height="178" fill="#5a4a2a" filter="url(#grain)"/>
  </g>
</svg>
