<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journal — Sentimentalica</title>
<meta name="description" content="Notes on junk journaling, art journaling, scrapbooking, and the slow art of making beautiful paper things.">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<meta name="p:domain_verify" content="2df16e7970c89985d1f99be0087cded7"/>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="logo-link">
    <img src="assets/logo.png" alt="Sentimentalica" class="logo-mark">
    <span class="logo-text">Sentimentalica</span>
  </a>
  <ul>
    <li><a href="blog.html">Journal</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="https://pinterest.com/sentimentalica" target="_blank" rel="noopener">Pinterest</a></li>
    <li><a class="nav-shop" href="https://www.etsy.com/shop/sentimentalica" target="_blank" rel="noopener">Shop on Etsy</a></li>
  </ul>
</nav>

<header class="blog-header">
  <h1>The <em>journal</em></h1>
  <p>Notes on junk journaling, art journaling, scrapbooking, and the slow art of making beautiful paper things.</p>
</header>

<section class="blog-list">
  <div class="post-grid-wide" id="post-grid"></div>
</section>

<footer>
  <div>© 2026 Sentimentalica · made with care in Kraków</div>
  <div>
    <a href="https://www.etsy.com/shop/sentimentalica" target="_blank" rel="noopener">Etsy</a>
    <a href="https://pinterest.com/sentimentalica" target="_blank" rel="noopener">Pinterest</a>
    <a href="mailto:hello@sentimentalica.com">Contact</a>
  </div>
</footer>

<script>
const THUMBS = ['t1','t2','t3'];
let allPosts = [];

async function loadPosts() {
  try {
    const r = await fetch('blog/index.json?t=' + Date.now());
    const d = await r.json();
    allPosts = d.posts || [];
    renderPosts();
  } catch { }
}

function renderPosts() {
  const grid = document.getElementById('post-grid');
  const posts = allPosts;
  if (posts.length === 0) {
    grid.innerHTML = '<p style="color:#7a6e5f;font-style:italic;padding:2rem 0">No posts yet.</p>';
    return;
  }

  grid.innerHTML = posts.map((p, i) => {
    const thumb = p.thumb
      ? `<img class="post-thumb-img" src="${p.thumb}" alt="${p.title}" loading="lazy">`
      : `<div class="post-thumb ${THUMBS[i % THUMBS.length]}"></div>`;
    return `
      <a href="blog/${p.slug}.html" class="post-card">
        ${thumb}
        <h3>${p.title}</h3>
        ${p.excerpt ? `<p>${p.excerpt}</p>` : ''}
        <div class="post-meta">${p.dateDisplay || p.date}</div>
      </a>`;
  }).join('');
}

loadPosts();
</script>
</body>
</html>
