<script>
const THUMBS = ['t1','t2','t3'];
let allPosts = [];

async function loadPosts() {
  try {
    const r = await fetch('blog/index.json?t=' + Date.now());
    const d = await r.json();
    allPosts = d.posts || [];
    renderPosts();
  } catch { }
}

function renderPosts() {
  const grid = document.getElementById('post-grid');
  const posts = allPosts;
  if (posts.length === 0) {
    grid.innerHTML = '<p style="color:#7a6e5f;font-style:italic;padding:2rem 0">No posts yet.</p>';
    return;
  }

  const isAdmin = !!localStorage.getItem('sp');
  grid.innerHTML = posts.map((p, i) => {
    const thumb = p.thumb
      ? `<img class="post-thumb-img" src="${p.thumb}" alt="${p.title}" loading="lazy">`
      : `<div class="post-thumb ${THUMBS[i % THUMBS.length]}"></div>`;
    // Admin sees Edit/Delete right under every card (invisible to visitors).
    const adminRow = isAdmin ? `
      <div class="card-admin-row" data-slug="${p.slug}">
        <a class="card-admin-btn" href="/admin/?edit=${p.slug}">✎ Edit</a>
        <button class="card-admin-btn card-admin-del" onclick="adminDelete('${p.slug}', this)">Delete</button>
      </div>` : '';
    return `
      <div class="post-card-wrap">
        <a href="blog/${p.slug}.html" class="post-card">
          ${thumb}
          <h3>${p.title}</h3>
          ${p.excerpt ? `<p>${p.excerpt}</p>` : ''}
          <div class="post-meta">${p.dateDisplay || p.date}</div>
        </a>
        ${adminRow}
      </div>`;
  }).join('');
}

const ADMIN_API = 'https://sentimentalica-admin-api.teter-album.workers.dev';
async function adminDelete(slug, btn) {
  const post = allPosts.find(p => p.slug === slug);
  if (!confirm('Delete "' + (post ? post.title : slug) + '" from the site? This cannot be undone.')) return;
  btn.textContent = 'Deleting…'; btn.disabled = true;
  try {
    const r = await fetch(ADMIN_API + '/delete-post', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: localStorage.getItem('sp'), slug })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'failed');
    const wrap = btn.closest('.post-card-wrap');
    if (wrap) wrap.remove();  // gone from this view now; live deploy ~1 min
  } catch (e) {
    alert('Could not delete: ' + e.message);
    btn.textContent = 'Delete'; btn.disabled = false;
  }
}

loadPosts();
</script>
